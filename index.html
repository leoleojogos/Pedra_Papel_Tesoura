<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jokenpô Cards - The Ultimate Duel</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <div id="start-menu" class="screen active">
            <div class="logo-container">
                <h1 class="glow-text">BINA_GAMES</h1>
                <h2>CARD GAMES</h2>
            </div>
            
            <div class="difficulty-selection">
                <h3>Escolha o Destino (Dificuldade)</h3>
                <div class="buttons-grid">
                     <button class="btn-diff easy" data-level="easy">
                        <span class="diff-title">Easy</span>
                        <span class="diff-desc">Para iniciantes. O bot erra de propósito.</span>
                     </button>
                     <button class="btn-diff normal" data-level="normal">
                        <span class="diff-title">Normal</span>
                        <span class="diff-desc">Justo e aleatório.</span>
                     </button>
                     <button class="btn-diff hard" data-level="hard">
                        <span class="diff-title">Hard</span>
                        <span class="diff-desc">O bot analisa seus padrões. Cuidado.</span>
                     </button>
                     <button class="btn-diff extreme" data-level="extreme">
                        <span class="diff-title">Extreme</span>
                        <span class="diff-desc">Injusto. O bot lê sua mente.</span>
                     </button>
                </div>
            </div>
        </div>

        <div id="game-arena" class="screen">
            <header class="game-header">
                <button id="btn-back" class="btn-icon">⬅ Sair</button>
                <div class="mode-display">Modo: <span id="current-mode-label">Normal</span></div>
            </header>

            <main class="battlefield">
                <div class="zone bot-zone">
                    <div class="score-card bot-score-card">
                        <span class="name">BOT</span>
                        <span id="bot-score" class="score">0</span>
                    </div>
                    <div class="card-slot bot-card-slot">
                        <div class="card-wrapper" id="bot-card-wrapper">
                            <div class="card empty-card">
                                <div class="card-inner">
                                    <div class="card-front">?</div>
                                    <div class="card-back" id="bot-card-face">👊</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="center-banner">
                    <h2 id="result-message">ESCOLHA SUA CARTA</h2>
                </div>

                <div class="zone player-zone">
                    <div class="card-slot player-card-slot">
                        <div class="card-wrapper" id="player-card-wrapper">
                            <div class="card empty-card">
                                <div class="card-inner">
                                    <div class="card-front">?</div>
                                    <div class="card-back" id="player-card-face">🖐</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="score-card player-score-card">
                        <span class="name">VOCÊ</span>
                        <span id="player-score" class="score">0</span>
                    </div>
                </div>

            </main>

            <div class="player-hand" id="player-hand">
                <button class="hand-card" data-choice="rock">
                    <span class="card-icon">👊</span>
                    <span class="card-name">Pedra</span>
                </button>
                <button class="hand-card" data-choice="paper">
                    <span class="card-icon">🖐</span>
                    <span class="card-name">Papel</span>
                </button>
                <button class="hand-card" data-choice="scissors">
                    <span class="card-icon">✌</span>
                    <span class="card-name">Tesoura</span>
                </button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
